<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birdsounder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background:
        url('https://cdn.download.ams.birds.cornell.edu/api/v1/asset/657355396/1800') center center / cover fixed;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      padding: 0;
    }

    .card {
      background: none;
      border-radius: 0;
      padding: 32px 36px;
      width: 100%;
      max-width: none;
      box-shadow: none;
    }

    /* ── Upload area ──────────────────────── */
    .upload-area {
      border: 2px dashed #3a5a2a;
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 14px;
      user-select: none;
      background: rgba(26, 42, 26, 0.84);
    }
    .upload-area:hover, .upload-area.drag-over {
      border-color: #8fbe5a;
      background: #1f2d1f;
    }
    .upload-area.loaded { border-color: #8fbe5a; border-style: solid; }
    .upload-text { font-size: 0.82rem; color: #fff; }
    .upload-text small { color: #fff; }
    .upload-filename { font-size: 0.85rem; color: #fff; font-weight: 600; margin-top: 6px; }

    /* ── Form elements ────────────────────── */
    .form-group {
      margin-bottom: 14px; text-align: left;
      background: rgba(26, 42, 26, 0.84);
      border: 1px solid rgba(58, 90, 42, 0.8);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .form-group label {
      display: block;
      font-size: 0.73rem;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }
    .form-group input[type=date],
    .form-group input[type=number],
    .form-group input[type=text],
    .form-group select {
      width: 100%;
      background: #1a2a1a;
      border: 1px solid #3a5a2a;
      border-radius: 7px;
      color: #fff;
      padding: 9px 12px;
      font-size: 0.93rem;
      font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #8fbe5a; }
    input[type=date]::-webkit-calendar-picker-indicator {
      filter: invert(0.65) sepia(1) hue-rotate(60deg);
      cursor: pointer;
    }
    select option { background: #1a2a1a; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* ── Pool info ────────────────────────── */
    #pool-info {
      background: rgba(26, 42, 26, 0.84);
      border: 1px solid rgba(58, 90, 42, 0.8);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.8rem;
      color: #fff;
      margin-bottom: 14px;
      text-align: left;
      line-height: 1.7;
    }
    #pool-info strong { color: #fff; }

    /* ── Misc ─────────────────────────────── */
    .divider { border: none; border-top: 1px solid #2e4a2e; margin: 16px 0; }

    .link-btn {
      background: rgba(26, 42, 26, 0.84); border: 1px solid rgba(58, 90, 42, 0.8); color: #fff;
      border-radius: 7px;
      font-size: 1.0rem; cursor: pointer; text-decoration: none;
      padding: 6px 9px; font-family: inherit;
    }
    .link-btn:hover { color: #fff; }

    .settings-body { margin-top: 12px; }

    .slider-row { display: flex; align-items: center; gap: 10px; }
    .slider-row span { font-size: 0.88rem; color: #fff; min-width: 28px; }
    input[type=range] { accent-color: #8fbe5a; flex: 1; }

    .btn-primary {
      display: block; width: 100%; padding: 13px;
      background: #4a7a3a; color: #fff; border: none; border-radius: 9px;
      font-size: 1rem; font-family: inherit; cursor: pointer; font-weight: 600;
      letter-spacing: 0.02em; transition: background 0.15s; margin-top: 8px;
    }
    .btn-primary:hover { background: #5a9a4a; }
    .btn-primary:disabled { background: #2a3a2a; color: #fff; cursor: default; }

    .error-msg {
      color: #fff; font-size: 0.83rem; margin-top: 10px; min-height: 1.2em;
      background: rgba(26, 42, 26, 0.84);
      border: 1px solid rgba(58, 90, 42, 0.8);
      border-radius: 8px;
      padding: 6px 10px;
    }
    .error-msg:empty { display: none; }

    /* ── Play screen ──────────────────────── */
    #screen-play { padding-top: 12px; }
    .back-btn { display: block; margin-bottom: 8px; text-decoration: none; }

    #progress {
      display: none;
    }
    #timer-bar-wrap {
      width: 100%; background: #1a2a1a; border-radius: 0 0 4px 4px;
      height: 6px; margin-bottom: 16px; overflow: hidden;
      border: 1px solid #3a5a2a; border-top: none;
    }
    #timer-bar {
      height: 100%; width: 0%; background: #8fbe5a;
      border-radius: 0; transition: none;
    }
    #status {
      font-size: 1.9rem; font-weight: 700; color: #fff; text-align: center;
      margin-bottom: 4px; min-height: 2.5rem;
      background: rgba(26, 42, 26, 0.84);
      border: 1px solid rgba(58, 90, 42, 0.8);
      border-radius: 8px;
      padding: 8px 12px;
    }
    #bird-name {
      display: none;
    }
    #credit {
      display: none;
    }
    #sonogram {
      margin-bottom: 0; height: 160px;
      overflow: hidden; border-radius: 6px 6px 0 0;
      border: 1px solid #3a5a2a; border-bottom: none;
    }
    #sonogram img {
      display: block; width: 100%; height: 100%; opacity: 0.85;
    }
    #bird-photo-wrap {
      display: none; text-align: center; margin-bottom: 12px;
    }
    #bird-photo {
      max-width: 100%; max-height: 360px;
      border-radius: 8px; border: 1px solid #3a5a2a; opacity: 0.92;
    }
    #countdown {
      display: none;
    }
    #btn-start {
      display: block; width: 100%; padding: 14px;
      background: #4a7a3a; color: #fff; border: none; border-radius: 9px;
      font-size: 1.05rem; font-family: inherit; cursor: pointer; font-weight: 600;
      transition: background 0.15s; margin-bottom: 16px;
    }
    #btn-start:hover { background: #5a9a4a; }

    .controls {
      display: flex; gap: 12px; justify-content: center;
      align-items: center; flex-wrap: wrap;
    }
    .btn-control {
      background: #3a5a2a; color: #fff; border: none; border-radius: 8px;
      padding: 10px 22px; font-size: 0.93rem; font-family: inherit;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-control:hover { background: #4a7a3a; }
    .btn-control:disabled { background: #2a3a2a; color: #fff; cursor: default; }

    .volume-wrap {
      display: flex; align-items: center; gap: 8px; color: #fff;
      background: rgba(26, 42, 26, 0.84);
      border: 1px solid rgba(58, 90, 42, 0.8);
      border-radius: 8px;
      padding: 8px 10px;
    }
    .volume-wrap input { width: 80px; }

    .or-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 0 0 16px 0; color: #fff; font-size: 0.8rem;
    }
    .or-divider span {
      background: rgba(26, 42, 26, 0.84);
      border: 1px solid rgba(58, 90, 42, 0.8);
      border-radius: 999px;
      padding: 4px 10px;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; border-top: 1px solid #2e4a2e;
    }

    @media (max-width: 480px) {
      .card { padding: 24px 20px; }
      #status { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<!-- ── Setup Screen ──────────────────────────────────────── -->
<div id="screen-setup" class="card">

  <div class="form-group">
    <label for="location-select">Choose a saved location</label>
    <select id="location-select">
      <option value="">&#x2015; select a location &#x2015;</option>
    </select>
  </div>

  <div class="or-divider"><span>or upload your own</span></div>

  <div id="upload-area" class="upload-area">
    <div id="upload-text" class="upload-text">
      Drop eBird barchart .txt here<br><small>or click to browse</small>
    </div>
    <div class="upload-filename" id="upload-filename" style="display:none"></div>
    <input type="file" id="file-input" accept=".txt"
           style="position:absolute;opacity:0;pointer-events:none;width:0;height:0">
  </div>

  <div class="form-group">
    <label for="date-input">Date</label>
    <input type="date" id="date-input">
  </div>

  <div id="filter-section" style="display:none">
    <div id="pool-info"></div>
    <div class="two-col">
      <div class="form-group">
        <label for="category-select">Category</label>
        <select id="category-select">
          <option value="common">Common only</option>
          <option value="commonAndUncommon" selected>Common &amp; Uncommon</option>
          <option value="uncommon">Uncommon only</option>
          <option value="uncommonAndRare">Uncommon &amp; Rare</option>
          <option value="rare">Rare only</option>
          <option value="all">All present birds</option>
        </select>
      </div>
      <div class="form-group">
        <label for="count-input">Number of birds</label>
        <input type="number" id="count-input" min="1" max="200" value="10" inputmode="numeric">
      </div>
    </div>
    <div class="form-group">
      <label for="sound-type-select">Sound type</label>
      <select id="sound-type-select">
        <option value="" selected>All sounds</option>
        <option value="song">Songs only</option>
        <option value="call">Calls only</option>
      </select>
    </div>
  </div>

  <button class="btn-primary" id="btn-load" disabled>Load &amp; Start &#x25B6;</button>
  <div class="error-msg" id="setup-error"></div>

  <hr class="divider">

  <button class="link-btn" id="settings-toggle">&#x2699; Settings</button>
  <div id="settings-body" class="settings-body" style="display:none">
    <div class="form-group" style="margin-top:12px">
      <label for="api-key-input">Xeno-Canto API Key</label>
      <input type="text" id="api-key-input" placeholder="Paste your key here&hellip;"
             autocomplete="off" spellcheck="false">
    </div>
    <div class="form-group">
      <label>Pause between birds</label>
      <div class="slider-row">
        <input type="range" id="pause-slider" min="1" max="10" step="1" value="5">
        <span id="pause-label">5s</span>
      </div>
    </div>
    <div class="form-group">
      <label>Clip duration</label>
      <div class="slider-row">
        <input type="range" id="clip-slider" min="5" max="60" step="5" value="30">
        <span id="clip-label">30s</span>
      </div>
    </div>
    <div class="form-group">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="show-images-toggle" checked> Show bird photos
      </label>
    </div>
    <div class="form-group">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="announce-birds-toggle" checked> Announce bird names
      </label>
    </div>
  </div>

</div>

<!-- ── Play Screen ───────────────────────────────────────── -->
<div id="screen-play" class="card" style="display:none">

  <button class="link-btn back-btn" id="btn-back">&larr; Back</button>

  <div id="status">Loading&hellip;</div>
  <div id="progress"></div>
  <div id="bird-name"></div>
  <div id="bird-photo-wrap"><img id="bird-photo" alt=""></div>
  <div id="sonogram"></div>
  <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
  <div id="credit"></div>
  <div id="countdown"></div>

  <button id="btn-start" style="display:none">&#x25B6; Start</button>

  <div class="controls">
    <button class="btn-control" id="btn-playpause" disabled>Pause</button>
    <button class="btn-control" id="btn-skip" disabled>Skip</button>
    <div class="volume-wrap">
      <span>&#x1F50A;</span>
      <input type="range" id="volume" min="0" max="1" step="0.05" value="1">
    </div>
  </div>

  <div class="error-msg" id="play-error"></div>

</div>

<audio id="player"></audio>

<script>
// =====================================================================
// DOM references
// =====================================================================

const elUploadArea     = document.getElementById('upload-area');
const elFileInput      = document.getElementById('file-input');
const elUploadText     = document.getElementById('upload-text');
const elUploadFilename = document.getElementById('upload-filename');
const elDateInput      = document.getElementById('date-input');
const elFilterSection  = document.getElementById('filter-section');
const elPoolInfo       = document.getElementById('pool-info');
const elCategorySelect  = document.getElementById('category-select');
const elSoundTypeSelect = document.getElementById('sound-type-select');
const elCountInput      = document.getElementById('count-input');
const elLocationSelect = document.getElementById('location-select');
const elSettingsToggle = document.getElementById('settings-toggle');
const elSettingsBody   = document.getElementById('settings-body');
const elApiKeyInput    = document.getElementById('api-key-input');
const elPauseSlider    = document.getElementById('pause-slider');
const elPauseLabel     = document.getElementById('pause-label');
const elClipSlider     = document.getElementById('clip-slider');
const elClipLabel      = document.getElementById('clip-label');
const elBtnLoad        = document.getElementById('btn-load');
const elSetupError     = document.getElementById('setup-error');

const elScreenSetup   = document.getElementById('screen-setup');
const elScreenPlay    = document.getElementById('screen-play');
const elBtnBack       = document.getElementById('btn-back');
const elProgress      = document.getElementById('progress');
const elStatus        = document.getElementById('status');
const elBirdName      = document.getElementById('bird-name');
const elCredit        = document.getElementById('credit');
const elBirdPhotoWrap    = document.getElementById('bird-photo-wrap');
const elBirdPhoto        = document.getElementById('bird-photo');
const elShowImagesToggle = document.getElementById('show-images-toggle');
const elAnnounceBirdsToggle = document.getElementById('announce-birds-toggle');
const elTimerBar      = document.getElementById('timer-bar');
const elSonogram      = document.getElementById('sonogram');
const elCountdown     = document.getElementById('countdown');
const elBtnStart      = document.getElementById('btn-start');
const elBtnPlayPause  = document.getElementById('btn-playpause');
const elBtnSkip       = document.getElementById('btn-skip');
const elVolume        = document.getElementById('volume');
const elPlayError     = document.getElementById('play-error');

const player = document.getElementById('player');

// =====================================================================
// App state
// =====================================================================

let parsedBirds      = [];    // [{commonName, sciName, values[48]}]
let classified       = null;  // {common, commonAndUncommon, all}
let selectedPool     = [];    // shuffled subset for this session
let playIndex        = 0;
let prefetchData     = null;  // {promise, forIndex}
let pendingFirstBird = null;
let countdownTimer   = null;
let clipTimer        = null;
let timerRaf         = null;
let isPaused         = false;
let advancing        = false;
let currentBirdData  = null;
let currentRecording = null;
let isRevealed       = false;
let nextSonogramReady = null; // Promise resolved when next bird's sonogram is cached
let nextPreloadedImg  = null; // Pre-decoded img element ready to insert

async function fetchWikipediaPhoto(commonName) {
  try {
    var resp = await fetch(
      'https://en.wikipedia.org/w/api.php?action=query&prop=pageimages&format=json' +
      '&piprop=thumbnail&pithumbsize=800&redirects&origin=*&titles=' +
      encodeURIComponent(commonName)
    );
    if (!resp.ok) return null;
    var data = await resp.json();
    var pages = data.query && data.query.pages;
    if (!pages) return null;
    var page = Object.values(pages)[0];
    return page && page.thumbnail ? page.thumbnail.source : null;
  } catch(e) { return null; }
}

// Per-bird shuffled queues so every recording is heard before any repeats
var recordingQueues = new Map();

function pickRecording(birdData) {
  var key = birdData.sciName;
  if (!recordingQueues.has(key) || recordingQueues.get(key).length === 0) {
    // Group by (quality, also-count) bucket, shuffle within each bucket,
    // then concatenate in order: A+0bg, A+1bg, A+2bg…, B+0bg, B+1bg…
    // so cleaner recordings within each quality tier come first,
    // but recordings with the same quality+noise level play randomly.
    var QUALITY_ORDER = ['A', 'B', 'C', 'D', 'E', '?'];
    var buckets = {};
    birdData.recordings.forEach(function(rec) {
      var q    = rec.quality || '?';
      var also = Array.isArray(rec.also) ? rec.also.filter(Boolean).length : 0;
      var k    = q + '|' + also;
      if (!buckets[k]) buckets[k] = { q: q, also: also, recs: [] };
      buckets[k].recs.push(rec);
    });

    var bucketList = Object.values(buckets);
    bucketList.sort(function(a, b) {
      var qi = QUALITY_ORDER.indexOf(a.q === '?' ? '?' : a.q);
      var qj = QUALITY_ORDER.indexOf(b.q === '?' ? '?' : b.q);
      if (qi < 0) qi = QUALITY_ORDER.length;
      if (qj < 0) qj = QUALITY_ORDER.length;
      if (qi !== qj) return qi - qj;
      return a.also - b.also;
    });

    var sorted = [];
    bucketList.forEach(function(b) { sorted = sorted.concat(shuffle(b.recs)); });

    // Reverse so .pop() draws from the front (best bucket first)
    recordingQueues.set(key, sorted.reverse());
  }
  return recordingQueues.get(key).pop();
}

// =====================================================================
// Utilities
// =====================================================================

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function randomItem(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function getApiKey() {
  return (localStorage.getItem('xcApiKey') || '').trim();
}

function getPauseDuration() {
  return parseInt(elPauseSlider.value, 10);
}

function getClipDuration() {
  return parseInt(elClipSlider.value, 10);
}

// =====================================================================
// eBird barchart parsing
//
// Format: 48 frequency columns per species (4 ~weekly bins x 12 months)
// Species lines: "Common Name (<em class="sci">Genus species</em>)\t[vals...]"
// =====================================================================

function parseEbirdFile(text) {
  const lines = text.replace(/\r/g, '').split('\n');
  const birds = [];

  for (const line of lines) {
    const match = line.match(/^(.+?)\s*\(<em class="sci">(.*?)<\/em>\)\t(.+)/);
    if (!match) continue;

    const commonName = match[1].trim();
    const sciName    = match[2].trim();
    const values     = match[3].split('\t').map(v => parseFloat(v) || 0);

    // Skip unresolved, family-level, hybrid, and slash entries
    if (/ sp\./.test(sciName))                                    continue;
    if (sciName.includes('/'))                                    continue;
    if (/ [xX] /.test(commonName) || commonName.includes(' x ')) continue;
    if (commonName.includes(' x ') || commonName.includes('\u00d7')) continue;
    if (sciName.split(' ').filter(Boolean).length < 2)            continue;

    birds.push({ commonName, sciName, values });
  }

  return birds;
}

// Maps a YYYY-MM-DD date to a 0-47 column index
// 4 bins per month: days 1-7 = bin 0, 8-14 = 1, 15-21 = 2, 22+ = 3
function dateToColumnIndex(dateStr) {
  const [, month, day] = dateStr.split('-').map(Number);
  const bin = Math.min(3, Math.floor((day - 1) / 7));
  return (month - 1) * 4 + bin;
}

// Rank birds by frequency; split into thirds (Common / Uncommon / Rare)
function classifyBirds(birds, colIdx) {
  // Only include birds with a non-zero frequency on this date
  const withFreq = birds
    .map(b => ({ ...b, freq: b.values[colIdx] != null ? b.values[colIdx] : 0 }))
    .filter(b => b.freq > 0)
    .sort((a, b) => b.freq - a.freq);

  const n = withFreq.length;
  // Top 15% = Common, next 15% (15-30%) = Uncommon, rest = Rare
  const nCommon = Math.max(1, Math.ceil(n * 0.15));
  const nCommonAndUncommon = Math.max(nCommon, Math.ceil(n * 0.30));
  return {
    common:            withFreq.slice(0, nCommon),
    uncommon:          withFreq.slice(nCommon, nCommonAndUncommon),
    commonAndUncommon: withFreq.slice(0, nCommonAndUncommon),
    rare:              withFreq.slice(nCommonAndUncommon),
    uncommonAndRare:   withFreq.slice(nCommon),
    all:               withFreq,
  };
}

// Returns an ordered pool: primary category first, then spill into next tier(s).
// Birds are shuffled within each tier before combining so the order is random.
function buildPool(requested) {
  if (!classified) return [];
  const cat = elCategorySelect.value;

  if (cat === 'all') {
    return shuffle(classified.all.slice()).slice(0, requested);
  }

  if (cat === 'common') {
    const primary   = shuffle(classified.common.slice());
    const spill     = shuffle(classified.uncommon.slice());
    const spillRare = shuffle(classified.rare.slice());
    return primary.concat(spill).concat(spillRare).slice(0, requested);
  }

  if (cat === 'commonAndUncommon') {
    const primary = shuffle(classified.commonAndUncommon.slice());
    const spill   = shuffle(classified.rare.slice());
    return primary.concat(spill).slice(0, requested);
  }

  if (cat === 'uncommon') {
    const primary   = shuffle(classified.uncommon.slice());
    const spillRare = shuffle(classified.rare.slice());
    const spillCommon = shuffle(classified.common.slice());
    return primary.concat(spillRare).concat(spillCommon).slice(0, requested);
  }

  if (cat === 'uncommonAndRare') {
    const primary = shuffle(classified.uncommonAndRare.slice());
    const spill   = shuffle(classified.common.slice());
    return primary.concat(spill).slice(0, requested);
  }

  // rare
  const primary = shuffle(classified.rare.slice());
  const spill   = shuffle(classified.uncommon.slice());
  const spillCommon = shuffle(classified.common.slice());
  return primary.concat(spill).concat(spillCommon).slice(0, requested);
}

function getCurrentPool() {
  if (!classified) return [];
  const cat = elCategorySelect.value;
  if (cat === 'common')            return classified.common;
  if (cat === 'commonAndUncommon') return classified.commonAndUncommon;
  if (cat === 'uncommon')          return classified.uncommon;
  if (cat === 'uncommonAndRare')   return classified.uncommonAndRare;
  if (cat === 'rare')              return classified.rare;
  return classified.all;
}

function updatePoolInfo() {
  if (!classified) { elPoolInfo.innerHTML = ''; return; }

  const pool      = getCurrentPool();
  const n         = classified.all.length;
  const nCommon   = classified.common.length;
  const nUncommon = classified.commonAndUncommon.length - nCommon;
  const nRare     = n - classified.commonAndUncommon.length;
  const requested = parseInt(elCountInput.value) || 10;
  const willUse   = Math.min(requested, classified.all.length);

  // Work out how many spill into the next tier(s)
  const cat = elCategorySelect.value;
  let spillNote = '';
  if (cat === 'common' && requested > nCommon && nCommon > 0) {
    const fromUncommon = Math.min(requested - nCommon, nUncommon);
    const fromRare     = Math.max(0, requested - nCommon - nUncommon);
    spillNote = ' <span style="color:#fff">(+' + fromUncommon + ' uncommon' +
      (fromRare > 0 ? ', +' + fromRare + ' rare' : '') + ')</span>';
  } else if (cat === 'commonAndUncommon' && requested > nCommon + nUncommon) {
    const fromRare = Math.min(requested - nCommon - nUncommon, nRare);
    if (fromRare > 0) spillNote = ' <span style="color:#fff">(+' + fromRare + ' rare)</span>';
  } else if (cat === 'uncommon' && requested > nUncommon && nUncommon > 0) {
    const fromRare   = Math.min(requested - nUncommon, nRare);
    const fromCommon = Math.max(0, requested - nUncommon - nRare);
    spillNote = ' <span style="color:#fff">(+' + fromRare + ' rare' +
      (fromCommon > 0 ? ', +' + fromCommon + ' common' : '') + ')</span>';
  } else if (cat === 'uncommonAndRare' && requested > nUncommon + nRare) {
    const fromCommon = Math.min(requested - nUncommon - nRare, nCommon);
    if (fromCommon > 0) spillNote = ' <span style="color:#fff">(+' + fromCommon + ' common)</span>';
  } else if (cat === 'rare' && requested > nRare && nRare > 0) {
    const fromUncommon = Math.min(requested - nRare, nUncommon);
    const fromCommon   = Math.max(0, requested - nRare - nUncommon);
    spillNote = ' <span style="color:#fff">(+' + fromUncommon + ' uncommon' +
      (fromCommon > 0 ? ', +' + fromCommon + ' common' : '') + ')</span>';
  }

  const [, month, day] = elDateInput.value.split('-').map(Number);
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  elPoolInfo.innerHTML =
    '<strong>' + n + '</strong> species present around ' + MONTHS[month - 1] + ' ' + day + ' &nbsp;&middot;&nbsp; ' +
    '<span title="Top 15% by frequency">Common: ' + nCommon + '</span> &middot; ' +
    '<span title="15\u201330% by frequency">Uncommon: ' + nUncommon + '</span> &middot; ' +
    '<span title="Bottom 70% by frequency">Rare: ' + nRare + '</span><br>' +
    'Will select <strong>' + willUse + '</strong> birds' + spillNote;

  const hasKey = getApiKey().length > 0;
  elBtnLoad.disabled = classified.all.length === 0 || !hasKey;

  if (!hasKey) {
    elSetupError.textContent = 'Enter your Xeno-Canto API key in Settings below.';
    elSettingsBody.style.display = '';
  } else {
    elSetupError.textContent = '';
  }
}

// =====================================================================
// Xeno-Canto API  (query by scientific name: gen:Genus+sp:species)
// =====================================================================

async function fetchBirdXC(birdMeta) {
  const key   = getApiKey();
  const base  = 'https://xeno-canto.org/api/3/recordings';
  const parts = birdMeta.sciName.split(' ').filter(Boolean);
  const genus = parts[0];
  const sp    = parts[1] || '';

  // Fetch all three query tiers, merge, de-duplicate by id, then sort:
  //   1. Quality: A > B > C > D > E (no-letter last)
  //   2. Fewest background species in "also" array
  const QUALITY_RANK = { A: 0, B: 1, C: 2, D: 3, E: 4 };
  const soundType = elSoundTypeSelect ? elSoundTypeSelect.value : '';
  const typeFilter = soundType ? '+type:' + soundType : '';
  const queries = [
    'gen:' + genus + '+sp:' + sp + typeFilter + '+grp:birds',
  ];

  var seen = new Set();
  var allRecs = [];

  for (const q of queries) {
    const url = base + '?query=' + q + '&key=' + encodeURIComponent(key) + '&per_page=500';
    let resp;
    try {
      resp = await fetch(url);
    } catch (e) {
      throw new Error('Network error: ' + e.message);
    }
    if (!resp.ok) {
      const body = await resp.text().catch(() => '');
      throw new Error('HTTP ' + resp.status + ': ' + body.slice(0, 120));
    }
    const data = await resp.json();
    if (data.recordings) {
      data.recordings.forEach(function(rec) {
        if (!seen.has(rec.id)) {
          seen.add(rec.id);
          allRecs.push(rec);
        }
      });
    }
  }

  if (allRecs.length === 0) return null;

  allRecs.sort(function(a, b) {
    var qa = QUALITY_RANK[a.q] !== undefined ? QUALITY_RANK[a.q] : 9;
    var qb = QUALITY_RANK[b.q] !== undefined ? QUALITY_RANK[b.q] : 9;
    if (qa !== qb) return qa - qb;
    var aa = Array.isArray(a.also) ? a.also.filter(Boolean).length : 0;
    var ab = Array.isArray(b.also) ? b.also.filter(Boolean).length : 0;
    return aa - ab;
  });

  const recordings = allRecs.map(function(rec) {
    return {
      audioUrl: rec.file.startsWith('//') ? 'https:' + rec.file : rec.file,
      sonogram: rec.sono && rec.sono.large ? (rec.sono.large.startsWith('//') ? 'https:' + rec.sono.large : rec.sono.large) : null,
      quality:  rec.q || '?',
      credit:   'Recorded by ' + rec.rec + ' \u00b7 ' + rec.cnt + ' (\u2605' + (rec.q || '?') + ')',
      length:   (function(s) { var p = (s||'').split(':'); return p.length === 2 ? parseInt(p[0],10)*60 + parseFloat(p[1]) : parseFloat(s) || 0; })(rec['length']),
    };
  });

  return Object.assign({}, birdMeta, { recordings: recordings });
}

// =====================================================================
// Session loading
// =====================================================================

async function loadSession() {
  const pool = getCurrentPool();
  if (!pool.length) { elSetupError.textContent = 'No birds in pool.'; return; }

  const key = getApiKey();
  if (!key) {
    elSetupError.textContent = 'Please enter your Xeno-Canto API key in Settings.';
    elSettingsBody.style.display = '';
    return;
  }

  const requested  = Math.max(1, parseInt(elCountInput.value) || 10);
  // Request 2 extra so silent skips don't leave us short
  const candidates = buildPool(requested + 5);
  if (candidates.length === 0) { elSetupError.textContent = 'No birds available.'; return; }
  playIndex        = 0;
  prefetchData     = null;
  pendingFirstBird = null;
  advancing        = false;
  recordingQueues  = new Map();

  // Switch to play screen early so the user sees loading progress
  elScreenSetup.style.display = 'none';
  elScreenPlay.style.display  = '';
  elProgress.textContent      = '';
  elBirdName.textContent      = '';
  elCredit.textContent        = '';
  elBirdPhotoWrap.style.display = 'none';
  elBirdPhoto.src             = '';
  elSonogram.innerHTML        = '';
  elTimerBar.style.width      = '0%';
  cancelAnimationFrame(timerRaf);
  elCountdown.textContent     = '';
  elPlayError.textContent     = '';
  elBtnPlayPause.disabled     = true;
  elBtnSkip.disabled          = true;
  elBtnStart.style.display    = 'none';
  elStatus.textContent        = 'Finding birds\u2026';

  // Pre-fetch all candidates concurrently, silently drop those with no recordings
  const fetched = await Promise.all(
    candidates.map(function(b) { return fetchBirdXC(b).catch(function() { return null; }); })
  );
  selectedPool = fetched.filter(Boolean).slice(0, requested);

  if (selectedPool.length === 0) {
    elStatus.textContent    = 'No recordings found.';
    elPlayError.textContent = 'There is a problem with your Xeno-Canto API key, no results were returned.';
    return;
  }

  elStatus.textContent     = selectedPool.length + ' bird' + (selectedPool.length !== 1 ? 's' : '') + ' ready.';
  playBird(selectedPool[0]);
}

// =====================================================================
// Playback
// =====================================================================

function playBird(birdData) {
  var recording = pickRecording(birdData);
  currentBirdData  = birdData;
  currentRecording = recording;
  isRevealed       = false;

  elProgress.textContent     = '';
  elStatus.textContent       = 'Bird ' + (playIndex + 1) + ' of ' + selectedPool.length;
  elBirdName.textContent       = '';
  elCredit.textContent         = '';
  elBirdPhotoWrap.style.display = 'none';
  elBirdPhoto.src               = '';
  if (elShowImagesToggle.checked) {
    fetchWikipediaPhoto(birdData.sciName).then(function(url) {
      if (url) { elBirdPhoto.src = url; elBirdPhotoWrap.style.display = 'block'; }
    });
  }
  elCountdown.textContent      = '';
  elPlayError.textContent    = '';
  elBtnPlayPause.textContent = 'Pause';
  elBtnPlayPause.disabled    = false;
  elBtnSkip.disabled         = false;
  isPaused = false;

  if (recording.sonogram) {
    var img;
    if (nextPreloadedImg && nextPreloadedImg.src === recording.sonogram) {
      img = nextPreloadedImg;   // reuse the already-decoded element
    } else {
      img = new Image();
      img.src = recording.sonogram;
    }
    nextPreloadedImg = null;
    img.alt = '';
    img.style.width = '100%';
    elSonogram.innerHTML = '';
    elSonogram.appendChild(img);
    // Scale only horizontally so the visible width maps exactly to the clip duration.
    var clipDur = recording.length || 0;
    if (clipDur > getClipDuration()) {
      img.style.width = (clipDur / getClipDuration() * 100).toFixed(2) + '%';
    }
  } else {
    elSonogram.innerHTML = '';
  }

  player.src    = recording.audioUrl;
  player.volume = parseFloat(elVolume.value);
  player.play().catch(function(err) {
    elPlayError.textContent = 'Playback error: ' + err.message;
  });

  // Animate progress bar over actual audio playback time.
  var MAX_SECS = Math.min(recording.length || getClipDuration(), getClipDuration());
  elTimerBar.style.transition = 'none';
  elTimerBar.style.width = '0%';
  clearTimeout(clipTimer);
  cancelAnimationFrame(timerRaf);
  (function tick() {
    if (!isRevealed) {
      var progress = Math.min(player.currentTime / MAX_SECS, 1);
      elTimerBar.style.width = progress * 100 + '%';
      if (player.currentTime >= MAX_SECS) {
        player.pause();
        revealBird(birdData, recording);
        return;
      }
    }
    timerRaf = requestAnimationFrame(tick);
  })();

  player.onended = function() {
    clearTimeout(clipTimer);
    revealBird(birdData, recording);
  };
}

function revealBird(birdData, recording) {
  if (isRevealed) return;
  isRevealed = true;
  cancelAnimationFrame(timerRaf);
  elTimerBar.style.transition = 'width 0.3s linear';
  elTimerBar.style.width = '100%';
  setTimeout(function() { elTimerBar.style.transition = 'none'; }, 350);
  elBtnPlayPause.disabled = true;
  elStatus.textContent    = birdData.commonName;
  elBirdName.textContent       = '';
  elCredit.textContent         = '';

  if (elAnnounceBirdsToggle.checked && 'speechSynthesis' in window) {
    var utt = new SpeechSynthesisUtterance(birdData.commonName);
    utt.rate = 0.8;
    window.speechSynthesis.speak(utt);
  }

  startCountdown(getPauseDuration(), advanceToNext);

  // Kick off next sonogram fetch + decode immediately so it's ready before playback starts
  var nextIdx = (playIndex + 1) % selectedPool.length;
  var nextBird = selectedPool[nextIdx];
  nextPreloadedImg = null;
  nextSonogramReady = new Promise(function(resolve) {
    if (!nextBird) { resolve(); return; }
    var nextQueue = recordingQueues.get(nextBird.sciName);
    var peekRec = nextQueue && nextQueue.length > 0
      ? nextQueue[nextQueue.length - 1]
      : (nextBird.recordings && nextBird.recordings[0]);
    if (!peekRec || !peekRec.sonogram) { resolve(); return; }
    var img = new Image();
    img.src = peekRec.sonogram;
    var tid = setTimeout(resolve, 5000);
    var done = function() { clearTimeout(tid); resolve(); };
    if (img.decode) {
      img.decode().then(function() { nextPreloadedImg = img; done(); }).catch(done);
    } else {
      img.onload  = function() { nextPreloadedImg = img; done(); };
      img.onerror = done;
    }
  });
}

function advanceToNext() {
  if (advancing) return;
  advancing = true;
  elBtnSkip.disabled      = true;
  elBtnPlayPause.disabled = true;

  // Advance index; reshuffle pool on wrap-around
  var nextIndex = (playIndex + 1) % selectedPool.length;
  if (nextIndex === 0) shuffle(selectedPool);
  playIndex = nextIndex;

  advancing = false;
  elPlayError.textContent = '';

  // Wait for the next sonogram to finish loading (started in revealBird)
  var ready = nextSonogramReady || Promise.resolve();
  nextSonogramReady = null;
  ready.then(function() { playBird(selectedPool[playIndex]); });
}

function startCountdown(seconds, callback) {
  clearTimeout(countdownTimer);
  var remaining = seconds;

  (function tick() {
    if (remaining <= 0) {
      callback();
      return;
    }
    remaining--;
    countdownTimer = setTimeout(tick, 1000);
  })();
}

// =====================================================================
// Setup event handlers
// =====================================================================

elUploadArea.addEventListener('click', function() { elFileInput.click(); });

elFileInput.addEventListener('change', function(e) {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

elUploadArea.addEventListener('dragover', function(e) {
  e.preventDefault();
  elUploadArea.classList.add('drag-over');
});
elUploadArea.addEventListener('dragleave', function() {
  elUploadArea.classList.remove('drag-over');
});
elUploadArea.addEventListener('drop', function(e) {
  e.preventDefault();
  elUploadArea.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    parsedBirds = parseEbirdFile(e.target.result);
    if (parsedBirds.length === 0) {
      elSetupError.textContent = 'Could not parse any species. Make sure this is an eBird barchart export (.txt).';
      return;
    }
    elSetupError.textContent = '';
    elUploadArea.classList.add('loaded');
    elUploadText.style.display     = 'none';
    elUploadFilename.style.display = '';
    elUploadFilename.textContent   = '\u2713 ' + file.name + ' \u2014 ' + parsedBirds.length + ' species';
    recomputeClassification();
  };
  reader.readAsText(file);
}

function recomputeClassification() {
  if (!parsedBirds.length || !elDateInput.value) return;
  var colIdx = dateToColumnIndex(elDateInput.value);
  classified = classifyBirds(parsedBirds, colIdx);
  elFilterSection.style.display = '';
  updatePoolInfo();
}

elDateInput.addEventListener('change', recomputeClassification);

elCategorySelect.addEventListener('change', function() {
  localStorage.setItem('category', elCategorySelect.value);
  updatePoolInfo();
});

elCountInput.addEventListener('input', function() {
  localStorage.setItem('birdCount', elCountInput.value);
  updatePoolInfo();
});

elSoundTypeSelect.addEventListener('change', function() {
  localStorage.setItem('soundType', elSoundTypeSelect.value);
});

elSettingsToggle.addEventListener('click', function() {
  elSettingsBody.style.display = elSettingsBody.style.display !== 'none' ? 'none' : '';
});

elApiKeyInput.value = localStorage.getItem('xcApiKey') || '';
elApiKeyInput.addEventListener('input', function() {
  localStorage.setItem('xcApiKey', elApiKeyInput.value.trim());
  updatePoolInfo();
});

elPauseSlider.addEventListener('input', function() {
  elPauseLabel.textContent = elPauseSlider.value + 's';
  localStorage.setItem('pauseDuration', elPauseSlider.value);
});

elClipSlider.addEventListener('input', function() {
  elClipLabel.textContent = elClipSlider.value + 's';
  localStorage.setItem('clipDuration', elClipSlider.value);
});

elShowImagesToggle.addEventListener('change', function() {
  localStorage.setItem('showImages', elShowImagesToggle.checked);
});

elAnnounceBirdsToggle.addEventListener('change', function() {
  localStorage.setItem('announceBirds', elAnnounceBirdsToggle.checked);
});

elBtnLoad.addEventListener('click', loadSession);

elLocationSelect.addEventListener('change', async function() {
  var url = elLocationSelect.value;
  if (!url) return;
  elSetupError.textContent = '';
  try {
    var resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var text = await resp.text();
    var label = elLocationSelect.options[elLocationSelect.selectedIndex].textContent;
    parsedBirds = parseEbirdFile(text);
    if (parsedBirds.length === 0) {
      elSetupError.textContent = 'Could not parse any species from this file.';
      return;
    }
    elUploadArea.classList.add('loaded');
    elUploadText.style.display     = 'none';
    elUploadFilename.style.display = '';
    elUploadFilename.textContent   = '\u2713 ' + label + ' \u2014 ' + parsedBirds.length + ' species';
    recomputeClassification();
  } catch (e) {
    elSetupError.textContent = 'Could not load location file: ' + e.message;
  }
});

// =====================================================================
// Play screen event handlers
// =====================================================================

elBtnBack.addEventListener('click', function() {
  clearTimeout(clipTimer);
  clearTimeout(countdownTimer);
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  player.pause();
  player.onended = null;
  prefetchData     = null;
  pendingFirstBird = null;
  advancing        = false;
  elSonogram.innerHTML        = '';
  elTimerBar.style.width      = '0%';
  cancelAnimationFrame(timerRaf);
  elScreenPlay.style.display  = 'none';
  elScreenSetup.style.display = '';
  updatePoolInfo();
});

elBtnStart.addEventListener('click', function() {
  elBtnStart.style.display = 'none';
  elPlayError.textContent  = '';
  playBird(selectedPool[0]);
});

elBtnPlayPause.addEventListener('click', function() {
  if (isPaused) {
    player.play();
    isPaused = false;
    elBtnPlayPause.textContent = 'Pause';
  } else {
    player.pause();
    isPaused = true;
    elBtnPlayPause.textContent = 'Play';
  }
});

elBtnSkip.addEventListener('click', function() {
  if (!isRevealed && currentBirdData && currentRecording) {
    // First skip: reveal the current bird
    clearTimeout(clipTimer);
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    player.pause();
    player.onended = null;
    revealBird(currentBirdData, currentRecording);
  } else {
    // Already revealed: jump to next
    clearTimeout(clipTimer);
    clearTimeout(countdownTimer);
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    player.pause();
    player.onended = null;
    advancing = false;
    advanceToNext();
  }
});

elVolume.addEventListener('input', function() {
  player.volume = parseFloat(elVolume.value);
});

// =====================================================================
// Init
// =====================================================================

elDateInput.value        = new Date().toISOString().split('T')[0];

// Restore persisted settings
(function() {
  var pause = localStorage.getItem('pauseDuration');
  if (pause) { elPauseSlider.value = pause; }
  var clip = localStorage.getItem('clipDuration');
  if (clip) { elClipSlider.value = clip; }
  var cat = localStorage.getItem('category');
  if (cat) { elCategorySelect.value = cat; }
  var count = localStorage.getItem('birdCount');
  if (count) { elCountInput.value = count; }
  var soundType = localStorage.getItem('soundType');
  if (soundType) { elSoundTypeSelect.value = soundType; }
  var showImages = localStorage.getItem('showImages');
  if (showImages !== null) { elShowImagesToggle.checked = showImages === 'true'; }
  var announceBirds = localStorage.getItem('announceBirds');
  if (announceBirds !== null) { elAnnounceBirdsToggle.checked = announceBirds === 'true'; }
})();

elPauseLabel.textContent = elPauseSlider.value + 's';
elClipLabel.textContent  = elClipSlider.value + 's';

if (!localStorage.getItem('xcApiKey')) {
  elSettingsBody.style.display = '';
}

(async function loadLocationList() {
  try {
    var resp = await fetch('https://api.github.com/repos/deusy/deusy.github.io/contents/Birdsounder/Locations');
    if (!resp.ok) return;
    var files = await resp.json();
    files
      .filter(function(f) { return f.type === 'file' && f.name.endsWith('.txt'); })
      .sort(function(a, b) { return a.name.localeCompare(b.name); })
      .forEach(function(f) {
        var opt = document.createElement('option');
        opt.value = f.download_url;
        opt.textContent = f.name.replace(/\.txt$/i, '');
        elLocationSelect.appendChild(opt);
      });
  } catch (e) {
    // silently fail — manual upload still works
  }
})();
</script>
